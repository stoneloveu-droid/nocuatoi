<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<title>Ví Nợ</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --card: #13131A;
    --card2: #1A1A24;
    --border: rgba(255,255,255,0.07);
    --accent: #C8FF57;
    --accent2: #57C8FF;
    --red: #FF5757;
    --orange: #FFB347;
    --text: #F0F0F8;
    --sub: rgba(240,240,248,0.45);
  }
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .dashboard {
    padding: 16px;
  }
  .dashboard h1 {
    font-size: 24px;
    margin-bottom: 16px;
  }
  .charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  @media (min-width: 768px) {
    .charts {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>
</head>
<body>
<div class="dashboard">
  <h1>Tổng Quan Thu Nhập & Chi Tiêu</h1>
  <div class="charts">
    <canvas id="incomeChart"></canvas>
    <canvas id="expenseChart"></canvas>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const incomeCtx = document.getElementById('incomeChart').getContext('2d');
const expenseCtx = document.getElementById('expenseChart').getContext('2d');

new Chart(incomeCtx, {
  type: 'bar',
  data: {
    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
    datasets: [{
      label: 'Thu nhập',
      data: [1200, 1900, 3000, 5000, 2000],
      backgroundColor: 'rgba(72, 199, 142, 0.5)',
      borderColor: 'rgba(72, 199, 142, 1)',
      borderWidth: 1
    }]
  },
  options: { responsive: true, plugins: { legend: { position: 'top' } } }
});

new Chart(expenseCtx, {
  type: 'bar',
  data: {
    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
    datasets: [{
      label: 'Chi tiêu',
      data: [800, 1500, 2000, 3000, 1800],
      backgroundColor: 'rgba(255, 87, 87, 0.5)',
      borderColor: 'rgba(255, 87, 87, 1)',
      borderWidth: 1
    }]
  },
  options: { responsive: true, plugins: { legend: { position: 'top' } } }
});
</script>
</body>
</html>
