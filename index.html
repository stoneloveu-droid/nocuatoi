<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<title>Dashboard: Thu nhập và Chi tiêu</title>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0F;
    --card: #13131A;
    --text: #F0F0F8;
    --accent: #C8FF57;
    --red: #FF5757;
  }
  body {
    font-family: 'Mulish', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
  }
  .container {
    padding: 16px;
  }
  h1 {
    text-align: center;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  .charts {
    margin-top: 32px;
  }
  .charts canvas {
    display: block;
    margin: 16px auto;
    max-width: 100%;
    height: auto;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Thu nhập và Chi tiêu</h1>
  <div id="form-section">
    <div class="form-group">
      <label for="income">Thu nhập hàng tháng (đ):</label>
      <input type="number" id="income" placeholder="Nhập thu nhập">
    </div>
    <div class="form-group">
      <label for="expense">Chi tiêu hàng tháng (đ):</label>
      <input type="number" id="expense" placeholder="Nhập chi tiêu">
    </div>
    <button onclick="saveData()">Lưu dữ liệu</button>
  </div>

  <div class="charts">
    <canvas id="incomeChart"></canvas>
    <canvas id="expenseChart"></canvas>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let data = { income: [], expense: [] };
  
  function saveData() {
    const income = document.getElementById('income').value;
    const expense = document.getElementById('expense').value;
    
    if (income && expense) {
      data.income.push(Number(income));
      data.expense.push(Number(expense));
      localStorage.setItem('financeData', JSON.stringify(data));
      renderCharts();
    } else {
      alert('Vui lòng nhập dữ liệu đầy đủ!');
    }
  }

  function renderCharts() {
    const incomeCtx = document.getElementById('incomeChart').getContext('2d');
    const expenseCtx = document.getElementById('expenseChart').getContext('2d');

    new Chart(incomeCtx, {
      type: 'bar',
      data: {
        labels: data.income.map((_, index) => `Tháng ${index + 1}`),
        datasets: [{
          label: 'Thu nhập',
          data: data.income,
          backgroundColor: 'rgba(72, 199, 142, 0.5)',
          borderColor: 'rgba(72, 199, 142, 1)',
          borderWidth: 1
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'top' } } }
    });

    new Chart(expenseCtx, {
      type: 'bar',
      data: {
        labels: data.expense.map((_, index) => `Tháng ${index + 1}`),
        datasets: [{
          label: 'Chi tiêu',
          data: data.expense,
          backgroundColor: 'rgba(255, 87, 87, 0.5)',
          borderColor: 'rgba(255, 87, 87, 1)',
          borderWidth: 1
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'top' } } }
    });
  }

  function loadData() {
    const savedData = localStorage.getItem('financeData');
    data = savedData ? JSON.parse(savedData) : { income: [], expense: [] };
    renderCharts();
  }

  loadData();
</script>
</body>
</html>
